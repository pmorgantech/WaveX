name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Same base image as .devcontainer/Dockerfile: CI builds with exactly the
    # toolchain developers use (ESP-IDF release-v5.5 at /opt/esp/idf, which is
    # the path `make esp32` sources, plus apt's arm-none-eabi-gcc for the
    # Daisy build - the devcontainer installs the same package). This
    # replaces the old per-run `git clone -b v5.2` ESP-IDF install, which was
    # both slow (~10 min) and a different major toolchain version than dev.
    container:
      image: espressif/idf:release-v5.5

    steps:
      - name: Install Daisy/host-test toolchain
        run: |
          apt-get update
          apt-get install -y gcc-arm-none-eabi cmake ninja-build build-essential git

      # The job runs as root inside the container; submodule operations trip
      # git's dubious-ownership check without this.
      - name: Trust workspace for git
        run: git config --global --add safe.directory '*'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run shared protocol tests
        run: make test-shared

      - name: Run ESP32 unit tests
        run: make test-esp32

      - name: Run Daisy unit tests
        run: make test-daisy

      - name: Build ESP32 firmware
        run: make esp32

      - name: Build Daisy firmware (Stage A)
        run: make daisy

      - name: Build Daisy firmware (Stage B flag set)
        run: make daisy-stageb
