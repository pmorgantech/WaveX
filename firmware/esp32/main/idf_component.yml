## IDF Component Manager Manifest File
dependencies:
  # Pinned >=9.4 for native ESP32-P4 PPA hardware-accelerated rendering
  # (~30% faster, ~30% lower CPU at 1280x720) - see docs/roadmap.md Phase 0.1.
  lvgl/lvgl: '>=9.4,<10'
  espressif/esp_lvgl_port: '*'
  espressif/esp_lcd_touch: '*'
  espressif/esp_lcd_touch_gt911: '*'
  waveshare/esp_lcd_hx8394: '*'
  waveshare/esp_lcd_dsi: '*'
  waveshare/esp32_p4_nano: '*'
  # USB MIDI device (roadmap Phase 1 item 8) - TinyUSB device stack;
  # MIDI class itself is enabled by CONFIG_TINYUSB_MIDI_COUNT=1.
  espressif/esp_tinyusb: '^2.0.0'
  esp_tca8418:
    git: https://github.com/atanisoft/esp_tca8418.git
